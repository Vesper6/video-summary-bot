# =============================================
# Video Summary Bot - CI
# =============================================
# 在以下情况触发：
# - push 到 main 分支
# - push 到任何分支（仅修改 .rs/.toml/.md 时）
# - 任何 Pull Request
#
# 在以下平台测试：
# - Ubuntu (latest) — KVM
# - Windows (latest) — WHVP
# - macOS (latest) — Hypervisor Framework
#
# 检查项：
# - cargo fmt --check
# - cargo clippy
# - cargo build (debug + release)
# - cargo test
# =============================================

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

# 取消同一分支的旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  RUSTUP_MAX_RETRIES: 3

jobs:
  # ===========================================
  # 1. 快速检查（fmt + clippy，跨平台）
  # ===========================================
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ===========================================
  # 2. 构建测试（debug + release）
  # ===========================================
  build:
    name: Build (${{ matrix.os }}-${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        profile: [debug, release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build (${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build --release --locked --all-features
          else
            cargo build --locked --all-features
          fi

      - name: Upload debug binary
        if: matrix.profile == 'debug' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: video-summary-bot-${{ matrix.os }}-${{ matrix.profile }}
          path: target/debug/video-summary-bot*
          retention-days: 7

  # ===========================================
  # 3. 单元测试
  # ===========================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run unit tests
        run: cargo test --all-features --locked -- --nocapture

  # ===========================================
  # 4. MSRV（最低支持 Rust 版本）
  # ===========================================
  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust ${{ vars.RUST_MSRV || '1.75' }}
        uses: dtolnay/rust-toolchain@1.75

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Build with MSRV
        run: cargo build --locked